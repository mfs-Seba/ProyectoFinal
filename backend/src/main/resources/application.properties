spring.application.name=tienda-ropa

# === Base de datos PostgreSQL ===
spring.datasource.url=jdbc:postgresql://localhost:5432/tienda_ropa
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:2712}
spring.datasource.driver-class-name=org.postgresql.Driver

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# === Servidor ===
server.port=8080

# === JWT ===
app.jwt.secret=cambia-esta-clave-muy-larga-y-secreta-de-al-menos-32-bytes-tienda-ropa-2026
app.jwt.expiration-ms=86400000

# === CORS ===
app.cors.allowed-origins=http://localhost:5173

# === Logging ===
logging.level.org.springframework.security=INFO
