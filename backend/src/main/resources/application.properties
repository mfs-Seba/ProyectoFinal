spring.application.name=tienda-ropa

# === base de datos postgresql ===
spring.datasource.url=jdbc:postgresql://localhost:5432/tienda_ropa
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:2712}
spring.datasource.driver-class-name=org.postgresql.Driver

# === jpa / hibernate ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# === servidor ===
server.port=8080

# === jwt ===
app.jwt.secret=cambia-esta-clave-muy-larga-y-secreta-de-al-menos-32-bytes-tienda-ropa-2026
app.jwt.expiration-ms=86400000

# === cors ===
app.cors.allowed-origins=http://localhost:5173

# === logging ===
logging.level.org.springframework.security=INFO
